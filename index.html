<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡El Juego de Tiquitona!</title>
    <style>
        body { text-align: center; font-family: 'Courier New', monospace; background-color: #000; color: white; padding: 20px; }
        #stats { font-size: 24px; color: #ffeb3b; }
        #hearts { color: #f44336; font-size: 30px; }
        #messageBox { font-size: 20px; color: #4fc3f7; height: 30px; margin: 10px; font-weight: bold; }
        #gameCanvas { border: 4px solid #fff; background-color: #212121; }
    </style>
</head>
<body>
    <h1>¡Recolecta 50 limones, Tiquitona!</h1>
    <div id="hearts">❤️❤️❤️❤️❤️</div>
    <div id="stats">Limones: <span id="scoreNum">0</span></div>
    <div id="messageBox"></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreNum');
        const heartsDiv = document.getElementById('hearts');
        const msgDiv = document.getElementById('messageBox');
        const bgMusic = document.getElementById('bgMusic');

        document.body.addEventListener('click', () => { bgMusic.play(); }, { once: true });

        let score = 0, lives = 5, isGameOver = false;
        let player = { x: 375, y: 430, w: 60, h: 45 };
        let items = [], bombs = [];

        document.addEventListener('keydown', (e) => {
            if(!isGameOver) {
                if(e.key === 'ArrowRight' && player.x < 740) player.x += 40;
                if(e.key === 'ArrowLeft' && player.x > 0) player.x -= 40;
            }
        });

        function drawRat(x, y) {
            ctx.fillStyle = '#9e9e9e'; 
            ctx.beginPath(); ctx.ellipse(x+30, y+25, 30, 20, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f8bbd0'; 
            ctx.beginPath(); ctx.ellipse(x+10, y+10, 10, 10, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(x+50, y+10, 10, 10, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; 
            ctx.fillRect(x+35, y+25, 10, 1); ctx.fillRect(x+35, y+27, 10, 1);
        }

        function update() {
            if(isGameOver) return;

            ctx.clearRect(0, 0, 800, 500);

            if(score == 10) msgDiv.textContent = "¡Tú puedes Tiquitona, eres genial!";
            else if(score == 20) msgDiv.textContent = "¡Eres la mejor!";
            else if(score == 30) msgDiv.textContent = "¡Estás muy cerca!";
            else if(score == 40) msgDiv.textContent = "¡Solo 10 más!";

            items.forEach((item, i) => {
                item.y += 4;
                ctx.fillStyle = '#ffd600'; ctx.beginPath(); ctx.ellipse(item.x, item.y, 12, 18, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4caf50'; ctx.fillRect(item.x, item.y-18, 4, 8);
                if(item.x > player.x && item.x < player.x+60 && item.y > player.y && item.y < player.y + 45) {
                    score++; scoreSpan.textContent = score; items.splice(i, 1);
                } else if(item.y > 500) items.splice(i, 1);
            });

            bombs.forEach((bomb, i) => {
                bomb.y += 6;
                ctx.fillStyle = '#616161'; ctx.beginPath(); ctx.arc(bomb.x, bomb.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff9800'; ctx.fillRect(bomb.x, bomb.y-25, 4, 10);
                if(bomb.x > player.x-10 && bomb.x < player.x+70 && bomb.y > player.y && bomb.y < player.y+45) {
                    lives--; heartsDiv.textContent = '❤️'.repeat(lives); bombs.splice(i, 1);
                    if(lives <= 0) location.reload();
                } else if(bomb.y > 500) bombs.splice(i, 1);
            });

            if(Math.random() < 0.03) items.push({x: Math.random()*770, y: 0});
            if(Math.random() < 0.015) bombs.push({x: Math.random()*770, y: 0});

            drawRat(player.x, player.y);

            if(score >= 50) {
                isGameOver = true;
                ctx.fillStyle = "white"; 
                ctx.font = "24px Courier New"; // Fuente un poco más pequeña para que quepa todo
                ctx.textAlign = "center";
                ctx.fillText("¡FELICITACIONES! ADBUNDIO Y LIMONCITO SE CASARON", 400, 250);
            } else {
                requestAnimationFrame(update);
            }
        }
        update();
    </script>
</body>
</html>
