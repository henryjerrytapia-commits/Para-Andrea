<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡El Gran Juego de Tiquitona!</title>
    <style>
        body { text-align: center; font-family: 'Courier New', Courier, monospace; background-color: #000; color: white; padding: 20px; }
        #stats { font-size: 24px; margin-bottom: 10px; color: #ffeb3b; }
        #hearts { color: #f44336; font-size: 30px; margin-bottom: 10px; }
        #gameCanvas { border: 4px solid #fff; background-color: #212121; }
    </style>
</head>
<body>
    <h1>¡Recolecta 50 limones, Tiquitona!</h1>
    <div id="hearts">❤️❤️❤️❤️❤️</div>
    <div id="stats">Limones: <span id="scoreNum">0</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- Música de fondo -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreNum');
        const heartsDiv = document.getElementById('hearts');
        const bgMusic = document.getElementById('bgMusic');

        // Iniciar música al hacer clic en cualquier parte
        document.body.addEventListener('click', () => bgMusic.play(), { once: true });

        let score = 0, lives = 5, isGameOver = false;
        let player = { x: 375, y: 430, w: 60, h: 40 };
        let items = [], bombs = [];

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' && player.x < 740) player.x += 40;
            if(e.key === 'ArrowLeft' && player.x > 0) player.x -= 40;
        });

        function drawRat() {
            ctx.fillStyle = '#9e9e9e';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = 'pink';
            ctx.fillRect(player.x + 5, player.y - 10, 15, 15);
            ctx.fillRect(player.x + 40, player.y - 10, 15, 15);
        }

        function update() {
            if(isGameOver) return;
            ctx.clearRect(0, 0, 800, 500);
            
            // Lógica limones
            if(Math.random() < 0.03) items.push({x: Math.random()*770, y: 0});
            items.forEach((item, i) => {
                item.y += 5;
                ctx.fillStyle = 'yellow';
                ctx.beginPath(); ctx.arc(item.x, item.y, 10, 0, Math.PI*2); ctx.fill();
                
                // Colisión solo con limones
                if(item.x > player.x && item.x < player.x+60 && item.y > player.y && item.y < player.y + 40) {
                    score++; scoreSpan.textContent = score; items.splice(i, 1);
                } else if(item.y > 500) items.splice(i, 1);
            });

            // Lógica bombas
            if(Math.random() < 0.015) bombs.push({x: Math.random()*770, y: 0});
            bombs.forEach((bomb, i) => {
                bomb.y += 7;
                ctx.fillStyle = 'red';
                ctx.fillRect(bomb.x, bomb.y, 20, 20);
                
                // Colisión solo con bombas
                if(bomb.x > player.x && bomb.x < player.x+60 && bomb.y > player.y && bomb.y < player.y + 40) {
                    lives--; heartsDiv.textContent = '❤️'.repeat(lives); bombs.splice(i, 1);
                    if(lives <= 0) { alert("¡Oh no, Tiquitona, perdiste!"); location.reload(); }
                } else if(bomb.y > 500) bombs.splice(i, 1);
            });

            drawRat();
            if(score < 50) requestAnimationFrame(update);
            else alert("¡Llegaste a 50! ¡La ratita y su amor se casaron!");
        }
        update();
    </script>
</body>
</html>
