<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡El Juego de Tiquitona!</title>
    <style>
        body { text-align: center; font-family: 'Courier New', monospace; background-color: #000; color: white; padding: 20px; }
        #stats { font-size: 24px; color: #ffeb3b; }
        #hearts { color: #f44336; font-size: 30px; }
        #messageBox { font-size: 20px; color: #4fc3f7; height: 30px; margin: 10px; font-weight: bold; }
        #gameCanvas { border: 4px solid #fff; background-color: #212121; }
    </style>
</head>
<body>
    <h1>¡Recolecta 50 limones, Tiquitona!</h1>
    <div id="hearts">❤️❤️❤️❤️❤️</div>
    <div id="stats">Limones: <span id="scoreNum">0</span></div>
    <div id="messageBox"></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreNum');
        const heartsDiv = document.getElementById('hearts');
        const msgDiv = document.getElementById('messageBox');

        let score = 0, lives = 5, isGameOver = false;
        let player = { x: 375, y: 430, w: 60, h: 45 };
        let items = [], bombs = [];

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' && player.x < 740) player.x += 40;
            if(e.key === 'ArrowLeft' && player.x > 0) player.x -= 40;
        });

        function update() {
            if(isGameOver) return;
            ctx.clearRect(0, 0, 800, 500);

            // Mensajes según puntaje
            if(score == 10) msgDiv.textContent = "¡Tú puedes Tiquitona, eres genial!";
            if(score == 20) msgDiv.textContent = "¡Eres la mejor!";
            if(score == 30) msgDiv.textContent = "¡Estás muy cerca!";
            if(score == 40) msgDiv.textContent = "¡Solo 10 más!";

            // Lógica Limones
            if(Math.random() < 0.03) items.push({x: Math.random()*770, y: 0});
            items.forEach((item, i) => {
                item.y += 4;
                ctx.fillStyle = '#ffd600';
                ctx.beginPath(); ctx.ellipse(item.x, item.y, 12, 18, 0.5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4caf50'; ctx.fillRect(item.x, item.y-18, 4, 8);
                
                if(item.x > player.x && item.x < player.x+60 && item.y > player.y && item.y < player.y + 45) {
                    score++; scoreSpan.textContent = score; items.splice(i, 1);
                } else if(item.y > 500) items.splice(i, 1);
            });

            // Bombas
            if(Math.random() < 0.015) bombs.push({x: Math.random()*770, y: 0});
            bombs.forEach((bomb, i) => {
                bomb.y += 6;
                ctx.fillStyle = '#616161';
                ctx.beginPath(); ctx.arc(bomb.x, bomb.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff9800'; ctx.fillRect(bomb.x, bomb.y-25, 4, 10);
                
                if(bomb.x > player.x && bomb.x < player.x+60 && bomb.y > player.y && bomb.y < player.y + 45) {
                    lives--; heartsDiv.textContent = '❤️'.repeat(lives); bombs.splice(i, 1);
                    if(lives <= 0) { alert("¡Tiquitona, ten cuidado!"); location.reload(); }
                } else if(bomb.y > 500) bombs.splice(i, 1);
            });

            // Dibujar Rata
            ctx.fillStyle = '#9e9e9e';
            ctx.beginPath(); ctx.ellipse(player.x+30, player.y+25, 30, 20, 0, 0, Math.PI*2); ctx.fill();

            if(score < 50) requestAnimationFrame(update);
            else {
                // Escena Final
                isGameOver = true;
                ctx.fillStyle = "white"; ctx.font = "40px Courier New";
                ctx.fillText("¡FELICITACIONES!", 250, 250);
                // Dibujar Limona con pelo
                ctx.fillStyle = '#ffd600'; ctx.beginPath(); ctx.ellipse(500, 400, 25, 35, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#795548'; ctx.fillRect(485, 360, 30, 20); // Pelo
                alert("¡La Tiquitona le da un beso al limón! ¡Se casaron!");
            }
        }
        update();
    </script>
</body>
</html>
