<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡El Juego de Tiquitona!</title>
    <style>
        body { text-align: center; font-family: 'Courier New', monospace; background-color: #000; color: white; padding: 20px; }
        #stats { font-size: 24px; color: #ffeb3b; }
        #hearts { color: #f44336; font-size: 30px; }
        #gameCanvas { border: 4px solid #fff; background-color: #212121; }
    </style>
</head>
<body>
    <h1>¡Recolecta 50 limones, Tiquitona!</h1>
    <div id="hearts">❤️❤️❤️❤️❤️</div>
    <div id="stats">Limones: <span id="scoreNum">0</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- Música estilo videojuego integrada -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreNum');
        const heartsDiv = document.getElementById('hearts');
        const bgMusic = document.getElementById('bgMusic');

        // Iniciar música al hacer clic
        document.body.addEventListener('click', () => { bgMusic.play(); }, { once: true });

        let score = 0, lives = 5, isGameOver = false;
        let player = { x: 375, y: 430, w: 60, h: 45 };
        let items = [], bombs = [];

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' && player.x < 740) player.x += 40;
            if(e.key === 'ArrowLeft' && player.x > 0) player.x -= 40;
        });

        function drawRat() {
            // Cuerpo y diseño mejorado
            ctx.fillStyle = '#9e9e9e';
            ctx.beginPath(); ctx.ellipse(player.x+30, player.y+25, 30, 20, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f8bbd0'; // Orejas
            ctx.beginPath(); ctx.ellipse(player.x+10, player.y+10, 10, 10, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(player.x+50, player.y+10, 10, 10, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#e1bee7'; // Hocico
            ctx.beginPath(); ctx.ellipse(player.x+30, player.y+30, 8, 6, 0, 0, Math.PI*2); ctx.fill();
        }

        function update() {
            if(isGameOver) return;
            ctx.clearRect(0, 0, 800, 500);
            
            // Limones con hojita
            if(Math.random() < 0.03) items.push({x: Math.random()*770, y: 0});
            items.forEach((item, i) => {
                item.y += 4;
                ctx.fillStyle = '#ffd600';
                ctx.beginPath(); ctx.ellipse(item.x, item.y, 12, 18, 0.5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4caf50'; ctx.fillRect(item.x, item.y-18, 4, 8);
                if(item.x > player.x && item.x < player.x+60 && item.y > player.y) { score++; scoreSpan.textContent = score; items.splice(i, 1); }
            });

            // Bombas grises con mecha
            if(Math.random() < 0.015) bombs.push({x: Math.random()*770, y: 0});
            bombs.forEach((bomb, i) => {
                bomb.y += 6;
                ctx.fillStyle = '#616161';
                ctx.beginPath(); ctx.arc(bomb.x, bomb.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff9800'; ctx.fillRect(bomb.x, bomb.y-25, 4, 10);
                if(bomb.x > player.x && bomb.x < player.x+60 && bomb.y > player.y) {
                    lives--; heartsDiv.textContent = '❤️'.repeat(lives); bombs.splice(i, 1);
                    if(lives <= 0) { alert("¡Tiquitona, ten cuidado!"); location.reload(); }
                }
            });

            drawRat();
            if(score < 50) requestAnimationFrame(update);
            else alert("¡Llegaste a 50! ¡La ratita y su amor se casaron!");
        }
        update();
    </script>
</body>
</html>
