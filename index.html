<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi lunita</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            background-image: url('https://www.transparenttextures.com/patterns/lemon-drops.png'), radial-gradient(#fff9c4, #fbc02d);
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .contenedor {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            display: inline-block;
            max-width: 800px;
            animation: aparecer 2s ease-out;
        }
        h1 { color: #d32f2f; line-height: 1.6; }
        img { width: 400px; border-radius: 20px; margin-top: 20px; border: 5px solid white; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Mi bebe estoy muy orgulloso de ute, realmente no tengo palabras para decirte y expresarte lo mucho que te amo eres el amor de mi vida, mi reina, mi mujer, mi todo, mi lunita, mi Mandy, vamos por mucho mas Tiquitona y jamas olvides que eres la mejor novia de todos los versos</h1>
        <!-- Nueva imagen -->
        <img src="https://pics.craiyon.com/2024-09-22/yyGWIDkUQ0-n3iiyg8JJ4Q.webp" alt="Imagen especial para Andrea">
    </div>
</body>
</html>
